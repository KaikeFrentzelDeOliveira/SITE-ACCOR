<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Administrador — Calculadora ISS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo-row">
      <img src="img/Logo_Accor.png" alt="Accor" class="accor-logo">
      <div class="brand-logos">
        <img src="img/Ibis.png" alt="Ibis" class="hotel-logo">
        <img src="img/Ibis-budget.png" alt="Ibis Budget" class="hotel-logo">
        <img src="img/Mercure.png" alt="Mercure" class="hotel-logo">
      </div>
    </div>
  </header>

  <main class="card">
    <h1>Calculadora ISS — Administrador</h1>

    <label class="label">Valor COM ISS</label>
    <input id="valor" type="text" placeholder="Ex: 4.171,50" />

    <div class="actions">
      <button type="button" onclick="calcularAdmin()">Calcular</button>
      <button type="button" class="ghost" onclick="logout()">Sair</button>
    </div>

    <div id="resultado" class="resultado"></div>
  </main>

  <footer class="site-footer">
    <small>Tricombo — Accor</small>
  </footer>

  <script src="script.js"></script>
  <script>
    const role2 = sessionStorage.getItem("loggedRole");
    if (role2 !== "adm") {
      window.location.href = "index.html";
    }

    function calcularAdmin() {
      const resp = calcularFluxoGeralForView();
      if (!resp) return;

      let html = `
        <h3>Valores Iniciais</h3>
        <div class="linha"><span>Y (com ISS):</span> <span class="valor">${resp.formatR(resp.Y)}</span></div>
        <div class="linha"><span>X (sem ISS):</span> <span class="valor">${resp.formatR(resp.X)}</span></div>
        <div class="linha"><span>A (Y - 3%):</span> <span class="valor">${resp.formatR(resp.A)}</span></div>
        <div class="linha destaque"><span>Complemento (B):</span> <span class="valor">${resp.formatR(resp.B)}</span></div>
        <div class="linha"><span>N (novo valor):</span> <span class="valor">${resp.formatR(resp.N)}</span></div>
        <div class="linha destaque"><span>ISS retido:</span> <span class="valor">${resp.formatR(resp.ISS)}</span></div>
        <div class="linha"><span>Prova real:</span> <span class="valor">${resp.formatR(resp.PR)}</span></div>
      `;

      if (resp.ajuste) {
        html += `
          <hr>
          <h3>Ajuste necessário</h3>
          <div class="linha destaque"><span>Ajustar complemento:</span> <span class="valor">${resp.ajuste.sign} ${resp.formatR(resp.ajuste.delta)}</span></div>
          <div class="linha"><span>Novo complemento:</span> <span class="valor">${resp.formatR(resp.ajuste.newB)}</span></div>
          <div class="linha"><span>Prova real ajustada:</span> <span class="valor">${resp.formatR(resp.ajuste.fluxo.PR)}</span></div>
        `;
      } else {
        html += `<p class="msg-ok">✅ PROVA_REAL já bate com X. Nenhum ajuste necessário.</p>`;
      }

      document.getElementById("resultado").innerHTML = html;
    }

    function logout() {
      sessionStorage.clear();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
